<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="50%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="128" fill="#09090b"/>
  <!-- Controller Silhouette -->
  <path d="M150,150 C120,150 80,180 80,240 C80,310 120,380 180,380 C210,380 230,350 256,350 C282,350 302,380 332,380 C392,380 432,310 432,240 C432,180 392,150 362,150 C310,150 286,210 256,210 C226,210 202,150 150,150 Z" 
        fill="url(#glow)" filter="url(#shadow)"/>
  <!-- D-Pad -->
  <path d="M140,215 L160,215 L160,195 L180,195 L180,215 L200,215 L200,235 L180,235 L180,255 L160,255 L160,235 L140,235 Z" fill="#ffffff"/>
  <!-- Action Buttons -->
  <circle cx="360" cy="205" r="10" fill="#3b82f6"/> <!-- Cross/Blue -->
  <circle cx="340" cy="225" r="10" fill="#22c55e"/> <!-- Triangle/Green -->
  <circle cx="380" cy="225" r="10" fill="#ef4444"/> <!-- Circle/Red -->
  <circle cx="360" cy="245" r="10" fill="#eab308"/> <!-- Square/Yellow -->
  <!-- Text V30 -->
  <text x="256" y="315" font-family="'Inter', system-ui, sans-serif" font-size="54" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="2">V30</text>
</svg>
